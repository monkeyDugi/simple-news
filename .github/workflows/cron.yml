name: cron

# flowpick 패턴 그대로: 한 cron 호출 안에서 scrape → summarize → cleanup 순차.
# 6시간 주기 (UTC 0/6/12/18 = KST 09/15/21/03), flowpick 디폴트.
# Vercel(AWS IP) 에서 네이버 본문 fetch 가 봇 차단(429) 받아 GitHub Actions runner(Microsoft Azure DC IP) 로 회피.

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Run cron (scrape → summarize → cleanup)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npx tsx scripts/run-cron.ts
